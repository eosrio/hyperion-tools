# Libre follower node with SHiP enabled (state_history). Modeled on cc32d9's wax_lightapi_bootstrap.
# Peers are appended at runtime from LIBRE_P2P_PEERS (see entrypoint.sh).
chain-state-db-size-mb = 16384
wasm-runtime = eos-vm-jit
abi-serializer-max-time-ms = 2000
p2p-accept-transactions = false
api-accept-transactions = false
read-mode = head
validation-mode = light

http-server-address = 0.0.0.0:8888
p2p-listen-endpoint = 0.0.0.0:9876
sync-fetch-span = 2000

plugin = eosio::chain_plugin
plugin = eosio::chain_api_plugin
plugin = eosio::db_size_api_plugin

# State History (SHiP) — Chronicle consumes this. chain-state-history carries the table deltas;
# the FIRST block after a snapshot load contains the entire state, which is how the cc32d9 stack
# bootstraps full state without a genesis replay.
plugin = eosio::state_history_plugin
trace-history = true
chain-state-history = true
state-history-endpoint = 0.0.0.0:8080

# Default Libre seed peers (probed reachable 2026-06-02; diverse providers/regions). The entrypoint
# appends any extra peers from $LIBRE_P2P_PEERS below. Only a brief connection is needed to advance a
# few blocks past the snapshot so SHiP exposes it to Chronicle.
p2p-peer-address = seed.libre.org:9876
p2p-peer-address = peer1-libre.eosphere.io:9876
p2p-peer-address = libre.p2p.eosusa.io:9885
p2p-peer-address = p2p.libre.cryptobloks.io:9876
p2p-peer-address = p2p.libre.eossweden.org:9976

##PEERS##
http-validate-host = false
